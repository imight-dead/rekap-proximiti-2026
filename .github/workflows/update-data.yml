name: Update Data from Google Sheets

on:
  schedule:
    # Setiap 30 menit
    - cron: '*/30 * * * *'
  workflow_dispatch: # Manual trigger

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Penugasan Day 0
        run: |
          curl -sL "https://docs.google.com/spreadsheets/d/1adWCS5dCfgN1EvljzTq7NSzIssnxi242GR4EX9tWAs4/export?format=csv" -o data/penugasan_day0.csv

      - name: Download Live Report Day 1
        run: |
          curl -sL "https://docs.google.com/spreadsheets/d/1_GzSEtrx_20lwFsP-pOshE4vg2JoN9usFRpbM6-UZwY/export?format=csv" -o data/livereport_day1.csv

      - name: Download Penugasan Day 1
        run: |
          curl -sL "https://docs.google.com/spreadsheets/d/1k2T0X8tGMRJnOOMHfwT4_2bN6JjFthArClm7QBW-ANs/export?format=csv" -o data/penugasan_day1.csv

      - name: Download Live Report Day 2
        run: |
          curl -sL "https://docs.google.com/spreadsheets/d/1fsMprvX29-LYlH8uixm4irwGnLY8ZMvewKtCRQtMoaU/export?format=csv" -o data/livereport_day2.csv

      - name: Download Penugasan Day 2
        run: |
          curl -sL "https://docs.google.com/spreadsheets/d/1tYmL83-GddIeYzkgUZc1voToBljmruvRJcyfltiQdrc/export?format=csv" -o data/penugasan_day2.csv

      - name: Download Live Report Day 3
        run: |
          curl -sL "https://docs.google.com/spreadsheets/d/1rSGFXnr4ySlulKxHtKekv47LhbU-XZ0Sd6limS6gD14/export?format=csv" -o data/livereport_day3.csv

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet data/ || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push if changed
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/
          git commit -m "Auto-update data dari Google Sheets [skip ci]"
          git push
