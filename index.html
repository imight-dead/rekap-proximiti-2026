<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rekap Pengumpulan Penugasan PROXIMITI 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Reference palette: dark-blue gradient + white cards */
            --bg-1: #1a2e4a;
            --bg-2: #2d4a6f;
            --bg-3: #4a6d8c;
            --brand: #1a2e4a;
            --brand-2: #2d4a6f;
            --surface: #ffffff;
            --field: #f8fafc;
            --border: #e2e8f0;
            --text: #1a2e4a;
            --muted: #475569;
            --muted-2: #64748b;
            --success: #0e9f56;
            --success-2: #11d660;
            --danger: #c1272d;
            --on-dark: #ffffff;
            --on-dark-muted: rgba(255, 255, 255, 0.72);
            --shadow-card: 0 22px 45px -18px rgba(8, 18, 33, 0.55);
            --shadow-soft: 0 6px 16px rgba(8, 18, 33, 0.14);
            /* aliases kept so any leftover var() references resolve sanely */
            --ink: #ffffff;
            --cream: #1a2e4a;
            --rust: #c1272d;
            --moss: #2d4a6f;
            --sand: #ffffff;
            --pale: #f8fafc;
            --line: #e2e8f0;
            --shadow: rgba(8, 18, 33, 0.16);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', 'Sora', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            color: var(--on-dark);
            background: linear-gradient(135deg, #1a2e4a 0%, #2d4a6f 50%, #4a6d8c 100%);
            background-attachment: fixed;
        }

        /* Old texture layers removed for a clean, minimal look */
        .noise-overlay,
        .paper-bg {
            display: none !important;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 28px 20px 40px;
        }

        /* ---------- Header ---------- */
        header {
            text-align: center;
            padding: 8px 0 4px;
        }

        .banner {
            max-width: 100%;
            height: auto;
            border-radius: 22px;
            box-shadow: var(--shadow-card);
            margin-bottom: 22px;
        }

        h1 {
            font-size: 1.9rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            color: var(--on-dark);
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 11px;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: var(--on-dark-muted);
            margin-bottom: 6px;
        }

        /* ---------- Section label ---------- */
        .section-label {
            font-size: 11px;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--on-dark-muted);
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 26px 0 18px;
        }

        .section-label::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.18);
        }

        /* ---------- Menu cards ---------- */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            grid-auto-rows: 1fr;
            gap: 18px;
        }

        .menu-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 22px 22px 20px;
            cursor: pointer;
            position: relative;
            box-shadow: var(--shadow-card);
            transition: transform 0.25s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.25s ease;
        }

        .menu-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 28px 55px -18px rgba(8, 18, 33, 0.6);
        }

        .menu-card:active {
            transform: translateY(-1px);
        }

        .menu-card.disabled {
            opacity: 0.55;
            cursor: not-allowed;
        }

        .menu-card.disabled:hover {
            transform: none;
            box-shadow: var(--shadow-card);
        }

        .menu-card h3 {
            font-size: 1.12rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 6px;
        }

        .menu-card p {
            font-size: 0.88rem;
            line-height: 1.5;
            color: var(--muted);
        }

        /* ---------- Status badges ---------- */
        .status-badge {
            display: inline-block;
            margin-top: 14px;
            padding: 5px 13px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            border-radius: 999px;
            color: #fff;
            background: var(--muted-2);
        }

        .status-available {
            background: var(--success);
        }

        .status-unavailable {
            background: var(--danger);
        }

        /* ---------- Data section ---------- */
        .data-section {
            display: none;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .back-btn {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 11px 18px;
            cursor: pointer;
            margin-bottom: 20px;
            box-shadow: var(--shadow-soft);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .back-btn svg { width: 15px; height: 15px; }

        .back-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px -8px rgba(8, 18, 33, 0.4);
        }

        .back-btn:active {
            transform: translateY(0);
            box-shadow: var(--shadow-soft);
        }

        .data-info {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: var(--shadow-card);
        }

        .data-info h2 {
            font-weight: 800;
            letter-spacing: -0.01em;
            color: var(--text);
            margin-bottom: 8px;
        }

        .data-info p { color: var(--muted); font-size: 0.9rem; }

        .legion-select {
            width: 100%;
            max-width: 400px;
            padding: 13px 16px;
            border: 2px solid var(--border);
            border-radius: 14px;
            font-family: inherit;
            font-size: 14px;
            background: var(--field);
            color: var(--text);
            cursor: pointer;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .legion-select:focus {
            outline: none;
            border-color: var(--brand-2);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(45, 74, 111, 0.12);
        }

        .count-badge {
            display: inline-block;
            margin-top: 14px;
            padding: 7px 14px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            border-radius: 999px;
            background: var(--brand);
            color: #fff;
        }

        /* ---------- Loading ---------- */
        .loading { text-align: center; padding: 48px 20px; }

        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.25);
            border-top-color: #fff;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 18px;
        }

        .spinner-logo {
            width: 64px;
            height: 64px;
            margin: 0 auto 18px;
            display: block;
            animation: spin 1.4s linear infinite;
        }

        .loading p { font-size: 12px; color: var(--on-dark-muted); }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ---------- Table ---------- */
        .table-container {
            overflow: hidden;
            border-radius: 18px;
            background: var(--surface);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-card);
        }

        /* horizontal scroll lives on an inner wrapper feel */
        .table-container { overflow-x: auto; }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 600px;
        }

        th, td {
            padding: 12px 14px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        th {
            background: #f1f5f9;
            color: var(--brand-2);
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            white-space: nowrap;
        }

        td {
            font-size: 13.5px;
            color: var(--text);
        }

        tr:nth-child(odd) { background: #ffffff; }
        tr:nth-child(even) { background: var(--field); }
        tr:hover { background: #eef2f7; }

        th:first-child, td:first-child {
            width: 1%;
            white-space: nowrap;
            text-align: center;
        }

        th:nth-child(3), td:nth-child(3),
        th:nth-child(4), td:nth-child(4) {
            white-space: nowrap;
            text-align: center;
        }

        td:has(.link-btn) { text-align: center; min-width: 150px; }

        /* ---------- Link button ---------- */
        .link-btn {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            background: #f1f5f9;
            color: var(--brand);
            padding: 7px 13px;
            border-radius: 10px;
            border: 1px solid var(--border);
            text-decoration: none;
            display: inline-block;
            margin: 3px;
            transition: background 0.2s ease, color 0.2s ease, transform 0.15s ease;
        }

        .link-btn:hover {
            background: var(--brand);
            color: #fff;
            border-color: var(--brand);
            transform: translateY(-1px);
        }

        .link-btn:active { transform: translateY(0); }

        /* ---------- Rekap status select (DET) ---------- */
        .rekap-select {
            font-family: inherit;
            font-size: 11px;
            font-weight: 700;
            padding: 7px 12px;
            border: 1px solid var(--border);
            border-radius: 999px;
            background: var(--field);
            color: var(--text);
            cursor: pointer;
        }

        .rekap-select.sudah {
            background: var(--success);
            border-color: var(--success);
            color: #fff;
        }

        .rekap-select.belum {
            background: var(--danger);
            border-color: var(--danger);
            color: #fff;
        }

        /* ---------- Audio controls ---------- */
        .audio-controls {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 10px 14px;
            box-shadow: var(--shadow-card);
            display: flex;
            align-items: center;
            gap: 6px;
            z-index: 1000;
            color: var(--text);
        }

        .audio-controls button {
            background: var(--field);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--brand);
            width: 34px;
            height: 34px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease;
        }

        .audio-controls button svg { width: 15px; height: 15px; }

        .audio-controls button:hover {
            background: var(--brand);
            border-color: var(--brand);
            color: #fff;
        }

        .audio-controls #audio-btn {
            width: 38px;
            height: 38px;
            border-radius: 14px;
            background: linear-gradient(135deg, var(--brand), var(--brand-2));
            border-color: var(--brand);
            color: #fff;
        }

        .audio-controls #audio-btn:hover { filter: brightness(1.08); }
        .audio-controls #audio-btn svg { width: 17px; height: 17px; }

        .audio-controls span#song-title {
            font-size: 11px;
            max-width: 160px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            cursor: pointer;
            color: var(--muted);
            transition: color 0.2s ease;
        }

        .audio-controls span#song-title:hover { color: var(--brand); }

        /* ---------- Playlist ---------- */
        .playlist-menu {
            display: none;
            position: absolute;
            bottom: 58px;
            right: 0;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 8px 0;
            min-width: 260px;
            max-height: 280px;
            overflow-y: auto;
            box-shadow: var(--shadow-card);
        }

        .playlist-menu.show { display: block; animation: slideUp 0.15s ease; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .playlist-header {
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--brand-2);
            padding: 8px 14px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 4px;
        }

        .playlist-item {
            padding: 9px 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text);
            transition: background 0.2s ease;
        }

        .playlist-item:hover { background: var(--field); }

        .playlist-item.active {
            background: #eef2f7;
            border-left: 3px solid var(--brand);
        }

        .playlist-item .song-number {
            font-size: 9px;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--muted);
        }

        .playlist-item.active .song-number {
            background: var(--brand);
            border-color: var(--brand);
            color: #fff;
        }

        .playlist-item .song-name { flex: 1; font-size: 12.5px; }

        /* ---------- Empty state ---------- */
        .empty-state {
            text-align: center;
            padding: 52px 20px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            box-shadow: var(--shadow-card);
        }

        .empty-state h3 { font-size: 1.25rem; font-weight: 700; color: var(--text); margin-bottom: 8px; }
        .empty-state p { font-size: 12px; color: var(--muted); }

        /* ---------- Divider ---------- */
        .hdr-divider {
            height: 1px;
            margin: 30px 0;
            background: rgba(255, 255, 255, 0.16);
            border: none;
        }

        /* ---------- Footer ---------- */
        footer {
            text-align: center;
            padding: 26px 20px;
            margin-top: 30px;
            border-top: 1px solid rgba(255, 255, 255, 0.14);
        }

        footer p {
            font-size: 10px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--on-dark-muted);
        }

        /* ---------- Password gate ---------- */
        #pw-gate {
            position: fixed;
            inset: 0;
            z-index: 100000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: linear-gradient(135deg, #1a2e4a 0%, #2d4a6f 50%, #4a6d8c 100%);
        }

        .pw-box {
            position: relative;
            overflow: hidden;
            background: var(--surface);
            border-radius: 24px;
            box-shadow: var(--shadow-card);
            padding: 38px 32px;
            width: 100%;
            max-width: 380px;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .pw-icon {
            width: 58px;
            height: 58px;
            margin: 0 auto 4px;
            border-radius: 16px;
            background: linear-gradient(135deg, var(--brand), var(--brand-2));
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }

        .pw-icon svg { width: 26px; height: 26px; }

        .pw-box h2 { font-weight: 800; letter-spacing: -0.02em; font-size: 1.45rem; color: var(--text); }

        .pw-box p {
            font-size: 11px;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 6px;
        }

        .pw-field { position: relative; }

        .pw-field input {
            width: 100%;
            font-family: inherit;
            font-size: 14px;
            padding: 14px 46px 14px 16px;
            border: 2px solid var(--border);
            border-radius: 14px;
            background: var(--field);
            color: var(--text);
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .pw-field input:focus {
            outline: none;
            border-color: var(--brand-2);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(45, 74, 111, 0.12);
        }

        #pw-toggle {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--muted-2);
            cursor: pointer;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #pw-toggle svg { width: 18px; height: 18px; }
        #pw-toggle:hover { color: var(--brand); }

        .pw-submit {
            font-family: inherit;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-size: 12px;
            padding: 14px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, var(--brand), var(--brand-2));
            color: #fff;
            cursor: pointer;
            box-shadow: var(--shadow-soft);
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }

        .pw-submit:hover { transform: translateY(-2px); box-shadow: 0 12px 24px -8px rgba(8, 18, 33, 0.45); }

        #pw-error { color: var(--danger); font-size: 12px; min-height: 14px; font-weight: 700; }

        .pw-box.shake { animation: shake 0.4s; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-7px); }
            40%, 80% { transform: translateX(7px); }
        }

        /* ---------- Accessibility (UI/UX Pro Max checklist) ---------- */
        a, button, select, .menu-card, #song-title { cursor: pointer; }
        .menu-card.disabled { cursor: not-allowed; }

        :focus-visible {
            outline: 3px solid var(--success-2);
            outline-offset: 3px;
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
                scroll-behavior: auto !important;
            }
        }

        /* ---------- Responsive ---------- */
        @media (max-width: 768px) {
            h1 { font-size: 1.5rem; }
            .container { padding: 20px 16px 32px; }
            .menu-card { padding: 18px 18px 16px; }
            th, td { padding: 9px 11px; font-size: 12px; }
            .audio-controls { bottom: 12px; right: 12px; padding: 8px 10px; }
            .audio-controls span#song-title { display: none; }
        }
    </style>
</head>

<body>
    <!-- Password gate -->
    <div id="pw-gate">
        <form id="pw-form" class="pw-box">
            <div class="pw-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            </div>
            <h2>PROXIMITI 2026</h2>
            <p>Rekap Pengumpulan Penugasan</p>
            <div class="pw-field">
                <input id="pw-input" type="password" autocomplete="off" placeholder="Masukkan password" />
                <button type="button" id="pw-toggle" aria-label="Lihat password">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>
                </button>
            </div>
            <button type="submit" class="pw-submit">Masuk</button>
            <span id="pw-error"></span>
        </form>
    </div>
    <script>
        (function () {
            const HASH = '3be367f1bfc467faf66ad1d48dfbe8c94592eb1a0546eb82ac932457286c07ee';
            const gate = document.getElementById('pw-gate');
            if (sessionStorage.getItem('proximiti_auth') === '1') { gate.remove(); return; }
            document.body.style.overflow = 'hidden';
            const form = document.getElementById('pw-form');
            const input = document.getElementById('pw-input');
            const err = document.getElementById('pw-error');
            const box = document.querySelector('.pw-box');
            setTimeout(() => input.focus(), 100);
            document.getElementById('pw-toggle').addEventListener('click', () => {
                input.type = input.type === 'password' ? 'text' : 'password';
                input.focus();
            });
            async function sha256(s) {
                const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(s));
                return [...new Uint8Array(buf)].map(b => b.toString(16).padStart(2, '0')).join('');
            }
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                if ((await sha256(input.value)) === HASH) {
                    sessionStorage.setItem('proximiti_auth', '1');
                    sessionStorage.setItem('proximiti_token', input.value);
                    document.body.style.overflow = '';
                    gate.remove();
                    if (window.__startMusic) window.__startMusic();
                } else {
                    err.textContent = 'Password salah!';
                    input.value = '';
                    box.classList.remove('shake');
                    void box.offsetWidth;
                    box.classList.add('shake');
                    input.focus();
                }
            });
        })();
    </script>

    <div class="noise-overlay" aria-hidden="true"></div>

        <section id="home-section">

                <p class="subtitle">Information Technology - Telkom University</p>
            </header>

            <div class="section-label">menu penugasan</div>

            <div class="menu-grid" id="menu-grid">

            </div>
        </section>

        <!-- Data Section -->
        <section id="data-section" class="data-section">

    <script>
        // Google Sheets IDs - fetch langsung dengan auto-refresh
        // Data is fetched through a password-gated Apps Script proxy (API URL = REKAP_API below).
        // Spreadsheet IDs are stored server-side in the Apps Script, NOT exposed in this client.
        function getToken() {
            return sessionStorage.getItem('proximiti_token') || '';
        }

        // Convert a 2D values array (from the proxy) into the {headers, data} shape processData expects
        function valuesToResult(values) {
            if (!values || !values.length) return { headers: [], data: [] };
            const headers = values[0].map((h, idx) => `${(h || '').toString().trim()}_COL${idx}`);
            const data = [];
            for (let i = 1; i < values.length; i++) {
                const vals = (values[i] || []).map(v => v == null ? '' : String(v));
                if (vals.every(v => v.trim() === '')) continue;
                const row = { _allValues: vals };
                headers.forEach((h, idx) => row[h] = vals[idx] || '');
                data.push(row);
            }
            return { headers, data };
        }

        // Auto-refresh setiap 5 detik
        let autoRefreshInterval = null;

        // Menu Configuration
        const menuItems = [
            { id: 'penugasan_day0', title: 'Penugasan Day 0', desc: 'Tugas Nametag & Twibbon', available: true },
            { id: 'livereport_day1', title: 'Live Report Day 1', desc: 'Screenshot Story IG Live Report', available: true },
            { id: 'penugasan_day1', title: 'Penugasan Day 1', desc: 'Video Instagram & TikTok', available: true },
            { id: 'livereport_day2', title: 'Live Report Day 2', desc: 'Screenshot Story IG Live Report', available: true },
            { id: 'penugasan_day2', title: 'Penugasan Day 2', desc: 'Poster Digital & Video Yel-Yel', available: true },
            { id: 'livereport_day3', title: 'Live Report Day 3', desc: 'Screenshot Story IG Live Report', available: true },
            { id: 'det', title: 'Laporan Kegiatan Eksternal', desc: 'DET - Laporan kegiatan eksternal peserta', available: true },
            { id: 'livereport_day4', title: 'Live Report Day 4', desc: 'Coming soon...', available: false },
            { id: 'penugasan_day4', title: 'Penugasan Day 4', desc: 'Coming soon...', available: false },
            { id: 'livereport_day5', title: 'Live Report Day 5', desc: 'Coming soon...', available: false },
            { id: 'penugasan_day5', title: 'Penugasan Day 5', desc: 'Coming soon...', available: false },
            { id: 'livereport_day6', title: 'Live Report Day 6', desc: 'Coming soon...', available: false },
        ];

        const legions = [
            'Legion of Amon-Ra',
            'Legion of Ankhara',
            'Legion of Anubis',
            'Legion of Hathor',
            'Legion of Neith',
            'Legion of Nepthys',
            'Legion of Orion',
            'Legion of Osiris',
            'Legion of Sphinx'
        ];

        let currentSection = null;
        let currentData = [];
        let rawData = [];

        // Initialize menu
        function initMenu() {
            const menuGrid = document.getElementById('menu-grid');
            menuGrid.innerHTML = menuItems.map(item => {
                const action = item.available ? `showSection('${item.id}')` : 'showUnavailable()';
                return `
                <div class="menu-card ${item.available ? '' : 'disabled'}"
                     role="button" tabindex="0" aria-disabled="${!item.available}"
                     onclick="${action}"
                     onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();${action}}">
                    <h3>${item.title}</h3>
                    <p>${item.desc}</p>
                    <span class="status-badge ${item.available ? 'status-available' : 'status-unavailable'}">
                        ${item.available ? 'udah bisa di cek' : 'Belum mulai guys Day nya'}
                    </span>
                </div>`;
            }).join('');
        }

        // Show unavailable message
        function showUnavailable() {
            alert('Sabar ciks! Day nya aja belom mulai dawg.');
        }

        // Parse CSV
        function parseCSV(csv) {
            const lines = csv.split('\n');
            const rawHeaders = parseCSVLine(lines[0]);

            // Make headers unique by adding index suffix for duplicates
            const headerCount = {};
            const headers = rawHeaders.map((h, idx) => {
                const cleanHeader = h.trim();
                if (headerCount[cleanHeader] === undefined) {
                    headerCount[cleanHeader] = 0;
                }
                headerCount[cleanHeader]++;
                // Always add index to make unique
                return `${cleanHeader}_COL${idx}`;
            });

            const data = [];

            for (let i = 1; i < lines.length; i++) {
                if (lines[i].trim() === '') continue;
                const values = parseCSVLine(lines[i]);
                const row = { _allValues: values }; // Store all values for easy access
                headers.forEach((header, index) => {
                    row[header] = values[index] || '';
                });
                data.push(row);
            }
            return { headers, data };
        }

        // Parse CSV line (handle quoted values)
        function parseCSVLine(line) {
            const result = [];
            let current = '';
            let inQuotes = false;

            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                if (char === '"') {
                    inQuotes = !inQuotes;
                } else if (char === ',' && !inQuotes) {
                    result.push(current.trim());
                    current = '';
                } else {
                    current += char;
                }
            }
            result.push(current.trim());
            return result;
        }

        // Fetch data from Google Sheets dengan fallback ke local
        async function fetchSheetData(sectionId) {
            if (!REKAP_API) return null;
            try {
                const res = await fetch(`${REKAP_API}?action=data&section=${encodeURIComponent(sectionId)}&token=${encodeURIComponent(getToken())}&t=${Date.now()}`);
                const json = await res.json();
                if (!json || json.error || !json.values) return null;
                return valuesToResult(json.values);
            } catch (error) {
                console.error('Error fetching data:', error);
                return null;
            }
        }

        // Show data section
        async function showSection(sectionId) {
            currentSection = sectionId;
            const menuItem = menuItems.find(m => m.id === sectionId);

            document.getElementById('home-section').style.display = 'none';
            document.getElementById('data-section').style.display = 'block';
            document.getElementById('section-title').textContent = menuItem.title;
            document.getElementById('section-desc').textContent = menuItem.desc;

            // Populate legion dropdown
            const legionSelect = document.getElementById('legion-select');
            legionSelect.innerHTML = '<option value="">--</option>' +
                legions.map(l => `<option value="${l}">${l}</option>`).join('');

            // Show loading
            document.getElementById('table-container').innerHTML = `
                <div class="loading">
                    <img src="logo-proximiti.png" class="spinner-logo" alt="Loading">
                    <p>Lagi ambil data dari spreadsheet nih, tunggu bentar...</p>
                </div>
            `;
            document.getElementById('count-badge').textContent = 'Loading...';

            // Load data
            await loadData(sectionId);

            // Start auto-refresh setiap 5 detik
            startAutoRefresh();
        }

        // Go back to home
        function goHome() {
            document.getElementById('home-section').style.display = 'block';
            document.getElementById('data-section').style.display = 'none';
            currentSection = null;

            // Stop auto-refresh
            stopAutoRefresh();
        }

        // Auto-refresh functions
        function startAutoRefresh() {
            stopAutoRefresh(); // Clear existing interval
            autoRefreshInterval = setInterval(async () => {
                if (currentSection) {
                    console.log('Auto-refreshing data...');
                    await loadDataSilent(currentSection);
                }
            }, 5000); // 5 detik
            console.log('Auto-refresh started (every 5 seconds)');
        }

        function stopAutoRefresh() {
            if (autoRefreshInterval) {
                clearInterval(autoRefreshInterval);
                autoRefreshInterval = null;
                console.log('Auto-refresh stopped');
            }
        }

        // Load data tanpa loading indicator (untuk auto-refresh)
        async function loadDataSilent(sectionId) {
            const result = await fetchSheetData(sectionId);

            if (!result || result.data.length === 0) {
                return; // Don't update if fetch failed
            }

            rawData = result.data;
            currentData = processData(result, sectionId);
            if (sectionId === 'det') await fetchRekapStatuses();
            filterByLegion();
        }

        // Load data for section
        async function loadData(sectionId) {
            const result = await fetchSheetData(sectionId);

            if (!result || result.data.length === 0) {
                document.getElementById('table-container').innerHTML = `
                    <div class="empty-state">
                        <h3>Waduh, gagal ambil data!</h3>
                        <p>Coba refresh atau cek koneksi internet ya</p>
                    </div>
                `;
                document.getElementById('count-badge').textContent = 'Error loading data';
                return;
            }

            rawData = result.data;
            currentData = processData(result, sectionId);
            if (sectionId === 'det') await fetchRekapStatuses();
            filterByLegion();
        }

        // Process data based on section type
        function processData(result, sectionId) {
            const data = result.data;

            console.log('Processing data, total rows:', data.length);
            if (data.length > 0) {
                console.log('First row keys:', Object.keys(data[0]));
                console.log('First row _allValues:', data[0]._allValues);
            }

            return data.map((row, idx) => {
                // Use _allValues array to find data by scanning all cells
                const allValues = row._allValues || [];

                // For spreadsheet, columns are usually: Timestamp, NAMA LENGKAP, NIM, KELAS, REGU, then links...
                // Let's use _allValues directly for more reliable parsing
                let nama = allValues[1] || '';  // Column B = NAMA LENGKAP
                let nim = allValues[2] || '';   // Column C = NIM
                let kelas = allValues[3] || ''; // Column D = KELAS
                let regu = allValues[4] || '';  // Column E = REGU

                // Fallback: scan all columns if above doesn't work
                if (!nama || !regu) {
                    Object.keys(row).forEach(key => {
                        const val = row[key];
                        if (!val || key === '_allValues') return;

                        const keyUpper = key.toUpperCase();
                        if (keyUpper.includes('NAMA') && !nama) {
                            nama = val;
                        } else if (keyUpper.includes('NIM') && !nim) {
                            nim = val;
                        } else if (keyUpper.includes('KELAS') && !kelas) {
                            kelas = val;
                        } else if (keyUpper.includes('REGU') && !regu) {
                            regu = val;
                        }
                    });
                }

                if (idx < 3) {
                    console.log(`Row ${idx}: nama="${nama}", nim="${nim}", kelas="${kelas}", regu="${regu}"`);
                    console.log(`Row ${idx} allValues:`, allValues.slice(0, 10));
                }

                const processed = {
                    nama: nama,
                    nim: nim,
                    kelas: kelas,
                    regu: normalizeRegu(regu),
                    raw: row
                };

                // Extract ALL links from ALL values in the row
                const driveLinks = [];
                const igLinks = [];
                const tiktokLinks = [];

                allValues.forEach((val, idx) => {
                    if (!val || typeof val !== 'string') return;
                    const cleanVal = val.trim();
                    if (!cleanVal) return;

                    if (cleanVal.includes('drive.google.com')) {
                        driveLinks.push(cleanVal);
                    }
                    if (cleanVal.includes('instagram.com')) {
                        igLinks.push(cleanVal);
                    }
                    if (cleanVal.includes('tiktok.com') || cleanVal.includes('tiktok')) {
                        tiktokLinks.push(cleanVal);
                    }
                });

                if (idx < 2) {
                    console.log(`Row ${idx} links found: drive=${driveLinks.length}, ig=${igLinks.length}, tiktok=${tiktokLinks.length}`);
                }

                // Extract links based on section type
                if (sectionId === 'det') {
                    // Find first filled activity block (8 cols starting at index 5)
                    let b = -1;
                    for (let i = 5; i < allValues.length; i += 8) {
                        if (allValues[i] && allValues[i].trim() !== '') { b = i; break; }
                    }
                    if (b !== -1) {
                        processed.jenis = allValues[b] || '';
                        processed.namaKegiatan = allValues[b + 1] || '';
                        processed.penyelenggara = allValues[b + 2] || '';
                        const t1 = (allValues[b + 3] || '').trim();
                        const t2 = (allValues[b + 4] || '').trim();
                        processed.tanggal = t1 + (t2 && t2 !== t1 ? ' – ' + t2 : '');
                        processed.bukti = (allValues[b + 5] || allValues[b + 6] || '').trim();
                    }
                    processed.id = ((allValues[0] || '') + '_' + nim).replace(/[^a-zA-Z0-9]/g, '');
                } else if (sectionId.includes('livereport')) {
                    // Live report = screenshot dari drive
                    processed.screenshot = driveLinks.length > 0 ? driveLinks[0] : '';
                } else if (sectionId === 'penugasan_day0') {
                    // Penugasan Day 0: Nametag (drive), Twibbon (drive), Link postingan (instagram)
                    processed.nametag = driveLinks.length > 0 ? driveLinks[0] : '';
                    processed.twibbon = driveLinks.length > 1 ? driveLinks[1] : '';
                    processed.twibbon_link = igLinks.length > 0 ? igLinks[0] : '';
                } else if (sectionId === 'penugasan_day1') {
                    // Penugasan Day 1: Instagram individu, TikTok, Video kelompok (instagram)
                    processed.instagram = igLinks.length > 0 ? igLinks[0] : '';
                    processed.tiktok = tiktokLinks.length > 0 ? tiktokLinks[0] : '';
                    processed.video_kelompok = igLinks.length > 1 ? igLinks[igLinks.length - 1] : '';
                } else if (sectionId === 'penugasan_day2') {
                    // Penugasan Day 2: Poster (drive), Video yel-yel (instagram)
                    processed.poster = driveLinks.length > 0 ? driveLinks[0] : '';
                    processed.yel_yel = igLinks.length > 0 ? igLinks[0] : '';
                }

                return processed;
            }).filter(row => row.nama && row.nama.trim() !== '');
        }

        // Normalize regu name
        function normalizeRegu(regu) {
            if (!regu) return '';
            let normalized = regu.trim();
            // Handle variations like "Nephthys" vs "Nepthys"
            if (normalized.toLowerCase().includes('nephthys')) {
                normalized = normalized.replace(/nephthys/gi, 'Nepthys');
            }
            return normalized;
        }

        // Filter by legion
        function filterByLegion() {
            const selectedLegion = document.getElementById('legion-select').value;

            // Kalau belum pilih legion, tampilkan pesan untuk pilih dulu
            if (!selectedLegion) {
                document.getElementById('table-container').innerHTML = `
                    <div class="empty-state">
                        <h3>Pilih Legion dulu dong!</h3>
                        <p>Pilih legion di dropdown di atas untuk lihat siapa aja yang udah ngumpul</p>
                    </div>
                `;
                document.getElementById('count-badge').textContent = 'Pilih legion dulu ya!';
                return;
            }

            // Filter berdasarkan legion yang dipilih
            const legionName = selectedLegion.toLowerCase().replace('legion of ', '');
            const filteredData = currentData.filter(row => {
                const rowRegu = row.regu.toLowerCase().replace('legion of ', '');
                return rowRegu.includes(legionName) || legionName.includes(rowRegu);
            });

            console.log('Selected legion:', selectedLegion);
            console.log('Total data:', currentData.length);
            console.log('Filtered data:', filteredData.length);
            console.log('Sample regu values:', currentData.slice(0, 5).map(r => r.regu));

            updateTable(filteredData, selectedLegion);
        }

        // Update table
        function updateTable(data, selectedLegion) {
            const container = document.getElementById('table-container');
            const countBadge = document.getElementById('count-badge');

            if (data.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <h3>Belum ada data nih!</h3>
                        <p>${selectedLegion ? `Belum ada yang ngumpul dari ${selectedLegion}` : 'Belum ada submission'}</p>
                    </div>
                `;
                countBadge.textContent = '0 orang ngumpul';
                return;
            }

            countBadge.textContent = `Anjay! ${data.length} orang udah ngumpul!`;

            // Get columns based on section type
            const columns = getColumnsForSection(currentSection);

            let tableHTML = `
                <table>
                    <thead>
                        <tr>
                            <th>No</th>
                            <th>Nama</th>
                            <th>NIM</th>
                            <th>Kelas</th>
                            ${columns.map(col => `<th>${col.label}</th>`).join('')}
                        </tr>
                    </thead>
                    <tbody>
            `;

            data.forEach((row, index) => {
                tableHTML += `
                    <tr>
                        <td>${index + 1}</td>
                        <td>${row.nama}</td>
                        <td>${row.nim}</td>
                        <td>${row.kelas}</td>
                        ${columns.map(col => `<td>${renderCell(col, row)}</td>`).join('')}
                    </tr>
                `;
            });

            tableHTML += '</tbody></table>';
            container.innerHTML = tableHTML;
        }

        // Get columns for each section
        function getColumnsForSection(sectionId) {
            switch (sectionId) {
                case 'det':
                    return [
                        { key: 'jenis', label: 'Jenis Kegiatan', type: 'text' },
                        { key: 'namaKegiatan', label: 'Nama Kegiatan', type: 'text' },
                        { key: 'penyelenggara', label: 'Penyelenggara', type: 'text' },
                        { key: 'tanggal', label: 'Tanggal', type: 'text' },
                        { key: 'bukti', label: 'Bukti', type: 'link' },
                        { key: 'status', label: 'Status Rekap', type: 'status' }
                    ];
                case 'penugasan_day0':
                    return [
                        { key: 'nametag', label: 'Nametag' },
                        { key: 'twibbon', label: 'Twibbon' },
                        { key: 'twibbon_link', label: 'Link Postingan' }
                    ];
                case 'livereport_day1':
                case 'livereport_day2':
                case 'livereport_day3':
                    return [
                        { key: 'screenshot', label: 'Screenshot Live Report' }
                    ];
                case 'penugasan_day1':
                    return [
                        { key: 'instagram', label: 'Link Instagram' },
                        { key: 'tiktok', label: 'Link TikTok' },
                        { key: 'video_kelompok', label: 'Video Kelompok' }
                    ];
                case 'penugasan_day2':
                    return [
                        { key: 'poster', label: 'Poster Digital' },
                        { key: 'yel_yel', label: 'Video Yel-Yel' }
                    ];
                default:
                    return [];
            }
        }

        // Render a table cell by column type
        function renderCell(col, row) {
            if (col.type === 'status') return rekapDropdown(row.id);
            if (col.type === 'text') {
                const v = row[col.key];
                return (v && v.trim() !== '') ? v : '<span style="opacity: 0.5">-</span>';
            }
            return formatLink(row[col.key]);
        }

        // Rekap status. Set REKAP_API to your deployed Google Apps Script Web App URL
        // for cross-device sync. If left empty, falls back to per-browser localStorage.
        // NOTE: this only hides the URL from plain "View Source". It is NOT real security —
        // the URL still appears in the Network tab. Real protection = the password token below.
        const REKAP_API = atob('aHR0cHM6Ly9zY3JpcHQuZ29vZ2xlLmNvbS9tYWNyb3Mvcy9BS2Z5Y2J5VTRMZGc3MEhuVUxlNWtBdHpic0hsRmRMNk5tMHNzUVUwMDBqUUVobmZDNFBMUkR4cEItdWF0V2g3OXp0ZVVDZmI5dy9leGVj');
        let rekapStatusMap = {};

        async function fetchRekapStatuses() {
            if (!REKAP_API) return;
            try {
                const res = await fetch(`${REKAP_API}?action=get&token=${encodeURIComponent(getToken())}&t=${Date.now()}`);
                rekapStatusMap = await res.json();
            } catch (e) { /* keep last known statuses */ }
        }

        function getRekapStatus(id) {
            if (REKAP_API) return rekapStatusMap[id] || 'belum';
            return localStorage.getItem('det_status_' + id) || 'belum';
        }
        function setRekapStatus(id, val, el) {
            if (el) el.className = 'rekap-select ' + val;
            if (REKAP_API) {
                rekapStatusMap[id] = val;
                fetch(`${REKAP_API}?action=set&id=${encodeURIComponent(id)}&status=${val}&token=${encodeURIComponent(getToken())}`).catch(() => {});
            } else {
                localStorage.setItem('det_status_' + id, val);
            }
        }
        function rekapDropdown(id) {
            const cur = getRekapStatus(id);
            return `<select class="rekap-select ${cur}" onchange="setRekapStatus('${id}', this.value, this)">
                        <option value="belum" ${cur === 'belum' ? 'selected' : ''}>Uncheck</option>
                        <option value="sudah" ${cur === 'sudah' ? 'selected' : ''}>Done</option>
                    </select>`;
        }

        // Format link
        function formatLink(url) {
            if (!url || url.trim() === '') {
                return '<span style="opacity: 0.5">-</span>';
            }
            return `<a href="${url}" target="_blank" class="link-btn">Ini linknya ciks</a>`;
        }

        // Audio controls with playlist
        const playlist = [
            { file: 'music/drop-dead.mp3', title: 'Drop Dead - Olivia Rodrigo' },
            { file: 'music/sign-of-the-times.mp3', title: 'Sign of the Times - Harry Styles' },
            { file: 'music/riptide.mp3', title: 'Riptide - Vance Joy' },
            { file: 'music/there-is-a-light.mp3', title: 'There Is a Light That Never Goes Out - The Smiths' },
            { file: 'music/everything-you-are.mp3', title: 'everything you are - Hindia' },
            { file: 'music/a-sorrowfull-reunion.mp3', title: 'A Sorrowful Reunion - Reality Club' },
            { file: 'music/and-i-love-her.mp3', title: 'And I Love Her - The Beatles' },
            { file: 'music/cant-take-my-eyes.mp3', title: "Can't Take My Eyes Off You - Frankie Valli" },
            { file: 'music/do-you-want-to-know-a-secret.mp3', title: 'Do You Want to Know a Secret - The Beatles' },
            { file: 'music/heaven-knows-im miserable-now.mp3', title: "Heaven Knows I'm Miserable Now - The Smiths" },
            { file: 'music/kids-hindia.mp3', title: 'kids - Hindia' },
            { file: 'music/last-night-on-earth.mp3', title: 'Last Night on Earth - Green Day' },
            { file: 'music/made-in-japan.mp3', title: 'Made in Japan - Buck Owens' },
            { file: 'music/para-no-verte-maspara.mp3', title: 'Para No Verte Más - La Mosca Tsé-Tsé' },
            { file: 'music/piano-man.mp3', title: 'Piano Man - Billy Joel' },
            { file: 'music/please-let-me-get-what-i-want.mp3', title: 'Please, Please, Please Let Me Get What I Want - The Smiths' },
            { file: 'music/semua-lagu-cinta-terdengar-sama.mp3', title: 'semua lagu cinta terdengar sama - Hindia' },
            { file: 'music/sweet-dispotision.mp3', title: 'Sweet Disposition - The Temper Trap' },
            { file: 'music/take-me-home-country-roads.mp3', title: 'Take Me Home, Country Roads - John Denver' },
            { file: 'music/this-could-be-us.mp3', title: 'This Could Be Us - Rae Sremmurd' }
        ];

        let currentSongIndex = 0;
        let isPlaying = false;
        let playlistVisible = false;
        const audio = document.getElementById('bg-music');
        const audioBtn = document.getElementById('audio-btn');
        const ICON_PLAY = '<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M8 5v14l11-7z"/></svg>';
        const ICON_PAUSE = '<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M6 5h4v14H6zm8 0h4v14h-4z"/></svg>';
        const songTitle = document.getElementById('song-title');
        const playlistMenu = document.getElementById('playlist-menu');
        const playlistItems = document.getElementById('playlist-items');

        // Initialize playlist UI
        function initPlaylist() {
            playlistItems.innerHTML = playlist.map((song, index) => `
                <div class="playlist-item ${index === currentSongIndex ? 'active' : ''}" onclick="playSong(${index})">
                    <span class="song-number">${index + 1}</span>
                    <span class="song-name">${song.title}</span>
                </div>
            `).join('');
        }

        function loadSong(index) {
            currentSongIndex = index;
            audio.src = playlist[index].file;
            songTitle.textContent = playlist[index].title;
            updatePlaylistUI();
        }

        function updatePlaylistUI() {
            const items = playlistItems.querySelectorAll('.playlist-item');
            items.forEach((item, index) => {
                item.classList.toggle('active', index === currentSongIndex);
            });
        }

        function toggleAudio() {
            if (isPlaying) {
                audio.pause();
                audioBtn.innerHTML = ICON_PLAY;
                audioBtn.setAttribute('aria-label', 'Putar musik');
            } else {
                if (!audio.src || audio.src === window.location.href) {
                    loadSong(0);
                }
                audio.play().catch(e => {
                    alert('File musik "' + playlist[currentSongIndex].file + '" belum ada. Tambahkan ke folder project ya!');
                });
                audioBtn.innerHTML = ICON_PAUSE;
                audioBtn.setAttribute('aria-label', 'Jeda musik');
            }
            isPlaying = !isPlaying;
        }

        function playSong(index) {
            loadSong(index);
            if (!isPlaying) {
                toggleAudio();
            } else {
                audio.play().catch(e => {
                    alert('File musik "' + playlist[currentSongIndex].file + '" belum ada. Tambahkan ke folder project ya!');
                });
            }
            hidePlaylist();
        }

        function togglePlaylist() {
            playlistVisible = !playlistVisible;
            if (playlistVisible) {
                playlistMenu.classList.add('show');
            } else {
                playlistMenu.classList.remove('show');
            }
        }

        function hidePlaylist() {
            playlistVisible = false;
            playlistMenu.classList.remove('show');
        }

        function nextSong() {
            currentSongIndex = (currentSongIndex + 1) % playlist.length;
            loadSong(currentSongIndex);
            if (isPlaying) {
                audio.play();
            }
        }

        function prevSong() {
            currentSongIndex = (currentSongIndex - 1 + playlist.length) % playlist.length;
            loadSong(currentSongIndex);
            if (isPlaying) {
                audio.play();
            }
        }

        // Auto play next song when current ends
        audio.addEventListener('ended', () => {
            nextSong();
            audio.play();
        });

        // Close playlist when clicking outside
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.audio-controls')) {
                hidePlaylist();
            }
        });

        // Initialize on load
        document.addEventListener('DOMContentLoaded', () => {
            initMenu();
            initPlaylist();

            // Preload first song so playback starts instantly (fix delay)
            loadSong(0);

            const startMusic = () => {
                audio.play().then(() => {
                    isPlaying = true;
                    audioBtn.innerHTML = ICON_PAUSE;
                    audioBtn.setAttribute('aria-label', 'Jeda musik');
                }).catch(() => {});
            };
            window.__startMusic = startMusic;

            // Only play once unlocked. If already authenticated this session,
            // start on first interaction; otherwise wait for the password gate.
            if (sessionStorage.getItem('proximiti_auth') === '1') {
                startMusic();
                const kick = () => {
                    if (!isPlaying) startMusic();
                    document.removeEventListener('pointerdown', kick);
                    document.removeEventListener('keydown', kick);
                };
                document.addEventListener('pointerdown', kick);
                document.addEventListener('keydown', kick);
            }
        });
    </script>
</body>

</html>
